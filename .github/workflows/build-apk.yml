name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

# Minimal token permissions required for artifact upload and release creation
permissions:
  contents: write

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / npm setup ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Build web assets ───────────────────────────────────────────────
      - name: Build web app (Vite)
        run: npm run build

      # ── 4. Java / Android SDK setup ───────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Capacitor – add & sync Android platform ────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      # ── 6. Detect keystore secret and decode if present ───────────────────
      - name: Detect keystore secret
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK (unsigned – no keystore configured)
        if: steps.keystore.outputs.available == 'false'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signed)
        if: steps.keystore.outputs.available == 'true'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 8. Locate the built APK ───────────────────────────────────────────
      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      # ── 9. Upload APK as workflow artifact ────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shg-bank-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # ── 10. Create GitHub Release with APK (only on version tags) ─────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
          body: |
            ## SHG Bank Android App

            Download the APK below and install it on your Android phone.

            ### Installation Steps:
            1. Download the `.apk` file on your Android phone.
            2. Open **Settings → Security** and enable **"Install from unknown sources"** (or **"Allow from this source"**).
            3. Open the downloaded APK and tap **Install**.
            4. Open **SHG Bank** app and log in.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

